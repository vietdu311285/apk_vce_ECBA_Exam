name: Build ECBA APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Kivy buildozer
        uses: kivy/buildozer-action@v1
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ecba-exam-apk
          path: bin/*.apk
          retention-days: 30

      - name: Show build result
        run: ls -lh bin/*.apk 2>/dev/null || echo "Build failed"
